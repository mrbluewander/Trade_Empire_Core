<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Trade Empire Command v7.5</title>
    <style>
        body { background:#05080a; color:#d4e8f0; font-family:sans-serif; margin:0; padding:20px; }
        .console { border:2px solid #c9a84c; background:#0d1520; padding:20px; min-height:400px; }
        .input-area { margin-top:20px; display:flex; gap:10px; }
        input, textarea { background:#000; color:#39e07a; border:1px solid #1a3a5c; padding:10px; flex:1; }
        .btn { border:1px solid #c9a84c; color:#c9a84c; background:transparent; padding:10px 20px; cursor:pointer; }
        .log { font-family:monospace; font-size:12px; color:#4a6a80; margin-top:10px; }
    </style>
</head>
<body>
    <div class="console">
        <h2 style="color:#c9a84c;">LOBSTER COMMAND - 多語系執行核心 (v7.5)</h2>
        <div id="display" style="height:300px; overflow-y:auto; border-bottom:1px solid #1a3a5c; margin-bottom:10px;">
            > 檢測到指揮部已上線...<br>
            > 萬象代理人已載入「小龍蝦」跨域重組基因...
        </div>
        <div class="input-area">
            <input type="password" id="apiKey" placeholder="輸入 API Key 啟動大腦...">
            <button class="btn" onclick="init()">激活</button>
        </div>
        <div class="input-area">
            <textarea id="task" placeholder="下達任務指令 (例如：補完 Status.md 內容)..."></textarea>
            <button class="btn" onclick="runAgent()">執行</button>
        </div>
        <div id="term" class="log"></div>
    </div>

<script>
    // 這裡就是您剛才看到的「血肉」邏輯，現在被封裝在 Script 標籤內
    const AgentCore = {
        languageSelector: function(taskType) {
            const matrix = { "FILE_OPS": "Shell/Bash", "NETWORK_IO": "Node.js", "LOGIC_CALC": "Rust/C++", "SCRIPTS": "Python/Ruby" };
            return matrix[taskType] || "Node.js";
        }
    };

    function init() {
        const key = document.getElementById('apiKey').value;
        if(key) {
            document.getElementById('term').innerHTML += "> 大腦握手連線成功...<br>";
        }
    }

    async function runAgent() {
        const t = document.getElementById('task').value;
        document.getElementById('display').innerHTML += `<br><span style="color:#c9a84c;">// 統帥指令: ${t}</span>`;
        document.getElementById('term').innerHTML += `> 正在分配最優執行語法...<br>`;
        // 模擬執行
        setTimeout(() => {
            document.getElementById('display').innerHTML += `<br>> [SUCCESS] 代理人已根據任務重新架構代碼塊。`;
        }, 1000);
    }
</script>
</body>
</html>
