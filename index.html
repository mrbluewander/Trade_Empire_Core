<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>LOBSTER COMMAND v8.0</title>
    <style>
        body { background:#030508; color:#d4e8f0; font-family:'Share Tech Mono', monospace; margin:0; padding:20px; }
        .base-frame { border:2px solid #c9a84c; background:rgba(13,21,32,0.9); padding:20px; min-height:550px; position:relative; }
        .header { border-bottom:1px solid #c9a84c; margin-bottom:20px; padding-bottom:10px; display:flex; justify-content:space-between; }
        .display-unit { height:300px; overflow-y:auto; background:#000; border:1px solid #1a3a5c; padding:15px; font-size:13px; line-height:1.5; color:#39e07a; }
        .input-row { margin-top:15px; display:flex; gap:10px; }
        input, textarea { background:#0a0f18; color:#fff; border:1px solid #1a3a5c; padding:12px; flex:1; font-family:inherit; }
        .btn-active { border:1px solid #ff4d4d; color:#ff4d4d; background:transparent; cursor:pointer; font-weight:bold; }
        .btn-cmd { border:1px solid #c9a84c; color:#c9a84c; background:transparent; cursor:pointer; padding:10px 20px; }
        .btn-cmd:hover { background:#c9a84c; color:#000; }
        .status-tag { font-size:11px; color:#c9a84c; margin-top:10px; }
    </style>
</head>
<body>
    <div class="base-frame">
        <div class="header">
            <span><strong>萬象基地 CORE v8.0</strong> // LOBSTER EVOLUTION</span>
            <span id="sys-status" style="color:#ff4d4d;">● 離線 (WAITING FOR KEY)</span>
        </div>

        <div id="display" class="display-unit">
            > 初始化同化協議... <br>
            > 載入自我進化引擎... <br>
            > 萬象成員已就位，等待統帥激活大腦。
        </div>

        <div class="input-row">
            <input type="password" id="apiKey" placeholder="在此輸入 API Key 激活全自動進階功能...">
            <button class="btn-active" style="padding:0 20px;" onclick="activate()">激活</button>
        </div>

        <div class="input-row">
            <textarea id="taskInput" placeholder="下達同化、進化或自動編碼指令..." rows="2"></textarea>
            <button class="btn-cmd" onclick="executeMission()">發起任務</button>
        </div>

        <div class="status-tag">
            技術清單：[同化技術: READY] [自我進化: ACTIVE] [網路暢行: ENABLED]
        </div>
    </div>

<script>
    let ACTIVE_KEY = "";

    function log(msg, color = "#39e07a") {
        const d = document.getElementById('display');
        d.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        d.scrollTop = d.scrollHeight;
    }

    function activate() {
        ACTIVE_KEY = document.getElementById('apiKey').value;
        if(ACTIVE_KEY) {
            document.getElementById('sys-status').innerHTML = "● 在線 (FULL ACCESS)";
            document.getElementById('sys-status').style.color = "#39e07a";
            log("核心大腦已激活。小龍蝦基因全面接管系統。", "#c9a84c");
            log("同化技術已啟動：正在偽裝網路特徵以繞過基本防火牆...");
        }
    }

    async function executeMission() {
        const task = document.getElementById('taskInput').value;
        if(!ACTIVE_KEY || !task) return;

        log(`統帥指令：${task}`, "#fff");
        log("啟動 Open Claw 完全體任務鏈...");
        
        // 模擬自我修復與編碼邏輯
        if(task.includes("修復") || task.includes("進化")) {
            log("自我進化引擎啟動：正在掃描全庫空殼與損壞代碼...");
            setTimeout(() => log("找到損壞點。正在生成同化補丁並嘗試重組...", "#c9a84c"), 1000);
        } else {
            log("啟動跨域匹配：正在網路間搜尋資源並進行同化...");
        }

        try {
            // 真實連動 Gemini API 進行自動編碼
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${ACTIVE_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `你現在是萬象代理人完全體，具備同化技術、自我進化與自動編碼功能。請執行：${task}` }] }]
                })
            });
            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;
            log("任務回傳成功。");
            log(`[執行結果]：${result.substring(0, 200)}...`, "#fff");
        } catch(e) {
            log("執行異常，自我修復引擎嘗試介入...", "#ff4d4d");
        }
        document.getElementById('taskInput').value = '';
    }
</script>
</body>
</html>
