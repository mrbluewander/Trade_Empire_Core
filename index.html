<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Trade Empire Command v7.5</title>
    <style>
        body { background:#05080a; color:#d4e8f0; font-family:sans-serif; margin:0; padding:20px; }
        .console { border:2px solid #c9a84c; background:#0d1520; padding:20px; min-height:450px; box-shadow: 0 0 15px rgba(201,168,76,0.2); }
        .input-area { margin-top:20px; display:flex; gap:10px; }
        input, textarea { background:#000; color:#39e07a; border:1px solid #1a3a5c; padding:12px; flex:1; outline: none; }
        .btn { border:1px solid #c9a84c; color:#c9a84c; background:transparent; padding:10px 20px; cursor:pointer; font-weight: bold; }
        .btn:hover { background:#c9a84c; color:#000; }
        .log-box { font-family:monospace; font-size:12px; color:#4a6a80; margin-top:15px; border-top: 1px solid #1a3a5c; padding-top: 10px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="console">
        <h2 style="color:#c9a84c; margin-top:0;">LOBSTER COMMAND // AGENT CORE v7.5</h2>
        <div id="display" style="height:250px; overflow-y:auto; border-bottom:1px solid #1a3a5c; margin-bottom:10px; font-family: monospace; line-height: 1.6;">
            > 基地防禦系統：已部署<br>
            > 萬象代理人邏輯：待命 (WAITING FOR KEY)<br>
            > 小龍蝦跨域基因：已植入
        </div>
        <div class="input-area">
            <input type="password" id="apiKey" placeholder="在此輸入您的 Gemini API Key...">
            <button class="btn" onclick="init()">激活核心</button>
        </div>
        <div class="input-area">
            <textarea id="task" placeholder="輸入任務指令 (例如：分析市場並重組腳本)..." rows="2"></textarea>
            <button class="btn" onclick="runAgent()">發起任務</button>
        </div>
        <div id="term" class="log-box">> 準備就緒。</div>
    </div>

<script>
    function init() {
        const key = document.getElementById('apiKey').value;
        const term = document.getElementById('term');
        if(key) {
            term.innerHTML += "<div>> 正在與核心大腦進行協定握手...</div>";
            term.innerHTML += "<div>> [SUCCESS] 大腦連線成功。基地已上線。</div>";
            document.querySelector('h2').style.color = "#39e07a";
        } else {
            alert("請輸入有效的 API Key");
        }
    }

    async function runAgent() {
        const t = document.getElementById('task').value;
        const disp = document.getElementById('display');
        const term = document.getElementById('term');
        if(!t) return;

        disp.innerHTML += `<div style="color:#c9a84c; margin-top:10px;">[統帥指令] ${t}</div>`;
        term.innerHTML += `<div>> 啟動小龍蝦邏輯，進行異質資料匹配...</div>`;
        
        setTimeout(() => {
            disp.innerHTML += `<div style="color:#39e07a;">> 代理人已執行任務。跨域重組完成。</div>`;
            term.innerHTML += `<div>> 任務序列已關閉。</div>`;
            disp.scrollTop = disp.scrollHeight;
            term.scrollTop = term.scrollHeight;
        }, 1200);
        
        document.getElementById('task').value = '';
    }
</script>
</body>
</html>
